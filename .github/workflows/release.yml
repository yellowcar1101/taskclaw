name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run tauri build -- --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ''
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}

      - name: List release files (debug)
        shell: pwsh
        run: Get-ChildItem -Path src-tauri/target/release/ -File | Select-Object Name, Length

      - name: Package portable ZIP
        shell: pwsh
        run: |
          $src = "src-tauri/target/release"
          $dest = "taskclaw-portable"
          New-Item -ItemType Directory -Path $dest | Out-Null
          # Copy exe + all DLLs needed at runtime
          Copy-Item "$src/TaskClaw.exe" $dest/
          Get-ChildItem "$src/*.dll" | Copy-Item -Destination $dest/
          # Copy resources folder if present
          if (Test-Path "$src/resources") {
            Copy-Item "$src/resources" $dest/ -Recurse
          }
          Compress-Archive -Path $dest -DestinationPath "taskclaw-portable-windows.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: taskclaw-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            taskclaw-portable-windows.zip
          retention-days: 30

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            taskclaw-portable-windows.zip
          generate_release_notes: true
