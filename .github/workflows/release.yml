name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run tauri build -- --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ''
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}

      - name: Prepare flat artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist | Out-Null

          # Portable: the bare exe (WebView2 is system-provided on Win10 21H2+)
          Copy-Item "src-tauri/target/release/TaskClaw.exe" "dist/TaskClaw.exe"

          # NSIS installer with a clean flat name
          $installer = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe" |
                       Sort-Object LastWriteTime -Descending |
                       Select-Object -First 1
          if ($installer) {
            Copy-Item $installer.FullName "dist/TaskClaw-installer.exe"
            Write-Host "Installer: $($installer.Name) -> dist/TaskClaw-installer.exe"
          }

          Write-Host "--- dist/ contents ---"
          Get-ChildItem dist/ | Select-Object Name, Length

      # Two separate artifacts so each download is a single file in a zip
      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: TaskClaw-portable
          path: dist/TaskClaw.exe
          retention-days: 30

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: TaskClaw-installer
          path: dist/TaskClaw-installer.exe
          retention-days: 30

      - name: Release (on tag push only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/TaskClaw.exe
            dist/TaskClaw-installer.exe
          generate_release_notes: true
